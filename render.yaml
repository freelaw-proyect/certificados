# https://render.com/docs/blueprint-spec
# En el dashboard: Environment = Docker (no "Python native").
services:
  - type: web
    name: certificados
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: REGISTROCIVIL_BUG_CLEAR_ON_START
        value: "false"
      - key: REGISTROCIVIL_BROWSER_BACKEND
        value: playwright
      # reCAPTCHA: en servidor suele hacer falta false; el contenedor sí tiene Chromium.
      - key: REGISTROCIVIL_WS_BROWSER_HEADLESS
        value: "true"
      - key: REGISTROCIVIL_APP_ENV
        value: prod
      # Obligatorio en Render (WAF bloquea Chromium en el servidor):
      # - REGISTROCIVIL_SESSION_TOKEN (secreto)
      # - REGISTROCIVIL_PUBLIC_URL=https://certificados-xxx.onrender.com
      # - DEFAULT_RUN, DEFAULT_EMAIL (@email2json.com), DEFAULT_NUMERO_DOCUMENTO_SOL
      # En tu Mac: python scripts/registrocivil_cookie_local.py --api-url $REGISTROCIVIL_PUBLIC_URL --token $REGISTROCIVIL_SESSION_TOKEN
