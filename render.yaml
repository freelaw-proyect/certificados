# https://render.com/docs/blueprint-spec
# En el dashboard: Environment = Docker (no "Python native").
services:
  - type: web
    name: certificados
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: REGISTROCIVIL_BUG_CLEAR_ON_START
        value: "false"
      - key: REGISTROCIVIL_BROWSER_BACKEND
        value: playwright
      # reCAPTCHA: en servidor suele hacer falta false; el contenedor sí tiene Chromium.
      - key: REGISTROCIVIL_WS_BROWSER_HEADLESS
        value: "true"
      # Añade: REGISTROCIVIL_SESSION_TOKEN, DEFAULT_RUN, DEFAULT_EMAIL, etc.
      # Cookie dinámica: script local → POST /registrocivil/session (ver scripts/registrocivil_cookie_local.py)
